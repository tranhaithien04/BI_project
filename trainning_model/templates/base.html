<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | JobMatch AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <div class="bg-grid"></div>

    <header class="topbar">
        <a class="brand" href="/">JobMatch AI</a>
        {% if user %}
        <nav class="menu">
            {% if user.role == "recruiter" %}
            <a href="/recruiter/jobs">Bài đăng</a>
            <a href="/recruiter/applications">Ứng viên</a>
            <a href="/profile">Hồ sơ</a>
            {% else %}
            <a href="/dashboard">Bảng điều khiển</a>
            <a href="/jobs">Việc làm</a>
            <a href="/profile">Hồ sơ</a>
            {% endif %}
            <form action="/logout" method="post">
                <button class="ghost-btn" type="submit">Đăng xuất</button>
            </form>
        </nav>
        {% endif %}
    </header>

    <main class="page-shell">{% block content %}{% endblock %}</main>
</body>

</html>
