{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <p class="eyebrow">Tạo tài khoản mới</p>
        <h1>Đăng ký</h1>
        <p class="subtle">Nhập thông tin cơ bản, sau đó bạn có thể cập nhật kỹ năng chi tiết.</p>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register" class="form-grid">
            <label>
                Tên đăng nhập
                <input type="text" name="username" required />
            </label>
            <label>
                Mật khẩu
                <input type="password" name="password" required />
            </label>
            <label>
                Vai trò
                <select name="role">
                    <option value="candidate">Ứng viên tìm việc</option>
                    <option value="recruiter">Nhà tuyển dụng</option>
                </select>
            </label>
            <label>
                Họ tên
                <input type="text" name="full_name" />
            </label>
            <label>
                Email
                <input type="email" name="email" />
            </label>
            <label>
                Kỹ năng
                <textarea name="skills" rows="3" placeholder="python, sql, machine learning"></textarea>
            </label>
            <button class="primary-btn" type="submit">Tạo tài khoản</button>
        </form>

        <p class="switch-link">
            Đã có tài khoản?
            <a href="/login">Đăng nhập ngay</a>
        </p>
    </div>
</section>
{% endblock %}
