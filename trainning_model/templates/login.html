{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <p class="eyebrow">Chào mừng bạn trở lại</p>
        <h1>Đăng nhập</h1>
        <p class="subtle">Đăng nhập để nhận gợi ý công việc theo kỹ năng của bạn.</p>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="form-grid">
            <label>
                Tên đăng nhập
                <input type="text" name="username" required />
            </label>
            <label>
                Mật khẩu
                <input type="password" name="password" required />
            </label>
            <button class="primary-btn" type="submit">Đăng nhập</button>
        </form>

        <p class="switch-link">
            Chưa có tài khoản?
            <a href="/register">Đăng ký tại đây</a>
        </p>
    </div>
</section>
{% endblock %}
